<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TermuxClawAgent — Solis</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #d4d4d4;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      padding: 24px 16px;
    }
    .container { max-width: 780px; margin: 0 auto; }

    /* ── Status card ── */
    .card {
      border: 1px solid #1f1f1f;
      border-radius: 12px;
      padding: 28px 32px;
      background: #111;
      margin-bottom: 24px;
    }
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
    .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #22c55e; box-shadow: 0 0 8px #22c55e88;
      animation: pulse 2s infinite; flex-shrink: 0;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
    h1 { font-size: 1.3rem; color: #fff; }
    .sub { color: #555; font-size: 0.8rem; margin-bottom: 22px; padding-left: 22px; }
    .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #1a1a1a; font-size: 0.83rem; }
    .row:last-child { border-bottom: none; }
    .label { color: #555; }
    .value { color: #a3e635; }
    .value.ok { color: #22c55e; }
    a { color: #60a5fa; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Activity feed ── */
    .feed-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .feed-title { color: #fff; font-size: 0.95rem; }
    .refresh-badge {
      font-size: 0.72rem; color: #444; background: #181818;
      border: 1px solid #222; border-radius: 20px; padding: 3px 10px;
    }
    .refresh-badge.live { color: #22c55e; border-color: #22c55e44; }

    .empty { color: #333; font-size: 0.82rem; text-align: center; padding: 32px 0; }

    /* ── Individual run entry ── */
    .entry {
      border: 1px solid #1a1a1a;
      border-radius: 8px;
      margin-bottom: 16px;
      overflow: hidden;
      background: #0e0e0e;
    }
    .entry-head {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 12px; padding: 12px 16px;
      background: #131313; border-bottom: 1px solid #1a1a1a;
      cursor: pointer; user-select: none;
    }
    .entry-head:hover { background: #161616; }
    .entry-user { font-size: 0.75rem; color: #666; flex-shrink: 0; }
    .entry-msg { color: #e0e0e0; font-size: 0.88rem; flex: 1; word-break: break-word; }
    .entry-meta { display: flex; gap: 10px; align-items: center; flex-shrink: 0; }
    .tag {
      font-size: 0.68rem; padding: 2px 7px; border-radius: 12px;
      background: #1c1c1c; border: 1px solid #2a2a2a; color: #777;
      white-space: nowrap;
    }
    .tag.rounds { color: #a78bfa; border-color: #a78bfa44; }
    .tag.dur   { color: #60a5fa; border-color: #60a5fa44; }
    .chevron { color: #333; font-size: 0.7rem; transition: transform .2s; }
    .entry.open .chevron { transform: rotate(90deg); }

    .entry-body { display: none; padding: 12px 16px 16px; }
    .entry.open .entry-body { display: block; }

    /* ── Rounds ── */
    .round-block { margin-bottom: 12px; }
    .round-label {
      font-size: 0.7rem; color: #444; margin-bottom: 6px;
      letter-spacing: .08em; text-transform: uppercase;
    }
    .thinking-box {
      background: #0d1117; border-left: 2px solid #7c3aed;
      padding: 8px 12px; border-radius: 4px;
      font-size: 0.78rem; color: #c084fc; line-height: 1.55;
      margin-bottom: 8px; word-break: break-word;
    }
    .tool-row {
      display: flex; gap: 8px; align-items: flex-start;
      background: #0d1117; border-left: 2px solid #0ea5e9;
      padding: 7px 12px; border-radius: 4px;
      font-size: 0.78rem; margin-bottom: 5px;
    }
    .tool-name { color: #38bdf8; flex-shrink: 0; }
    .tool-arg  { color: #94a3b8; word-break: break-all; }
    .tool-result {
      margin-top: 4px; color: #475569;
      font-size: 0.74rem; word-break: break-all;
    }
    .tool-result::before { content: "↳ "; color: #1d4ed8; }

    /* ── Final reply ── */
    .reply-box {
      margin-top: 10px;
      background: #0d1117; border-left: 2px solid #22c55e;
      padding: 8px 12px; border-radius: 4px;
      font-size: 0.78rem; color: #86efac; line-height: 1.55; word-break: break-word;
    }
    .reply-box::before { content: "Reply  "; color: #166534; font-size: 0.7rem; }
  </style>
</head>
<body>
<div class="container">

  <!-- Status card -->
  <div class="card">
    <div class="header"><div class="dot"></div><h1>Solis — TermuxClawAgent</h1></div>
    <p class="sub">Cloud agent running on Vercel • Powered by NVIDIA NIM</p>
    <div class="row"><span class="label">Status</span><span class="value ok">● Online</span></div>
    <div class="row"><span class="label">Model</span><span class="value">moonshotai/kimi-k2.6</span></div>
    <div class="row"><span class="label">Platform</span><span class="value">Vercel Serverless</span></div>
    <div class="row"><span class="label">Webhook</span><span class="value ok">✓ Registered</span></div>
    <div class="row"><span class="label">Storage</span><span class="value">GitHub two-way sync</span></div>
    <div class="row"><span class="label">Interface</span><span class="value"><a href="https://t.me/SolisTermuxclaw_bot" target="_blank">Telegram →</a></span></div>
  </div>

  <!-- Live activity feed -->
  <div class="card">
    <div class="feed-header">
      <span class="feed-title">Live Activity Feed</span>
      <span class="refresh-badge" id="badge">polling…</span>
    </div>
    <div id="feed"><p class="empty">No activity yet — send a message to the Telegram bot.</p></div>
  </div>

</div>

<script>
let lastTimestamp = null;

function fmtDur(ms) {
  if (ms < 1000) return ms + 'ms';
  return (ms / 1000).toFixed(1) + 's';
}

function fmtTime(iso) {
  const d = new Date(iso);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function renderEntry(e) {
  const div = document.createElement('div');
  div.className = 'entry';
  div.dataset.ts = e.timestamp;

  const totalTools = (e.rounds || []).reduce((s, r) => s + (r.toolCalls?.length || 0), 0);
  const roundCount = (e.rounds || []).length;

  div.innerHTML = `
    <div class="entry-head" onclick="this.closest('.entry').classList.toggle('open')">
      <div style="flex:1;min-width:0">
        <div class="entry-user">@${e.username} · ${fmtTime(e.timestamp)}</div>
        <div class="entry-msg">${escHtml(e.userMessage)}</div>
      </div>
      <div class="entry-meta">
        <span class="tag rounds">${roundCount} round${roundCount !== 1 ? 's' : ''}</span>
        ${totalTools ? `<span class="tag">${totalTools} tool${totalTools !== 1 ? 's' : ''}</span>` : ''}
        <span class="tag dur">${fmtDur(e.durationMs)}</span>
        <span class="chevron">▶</span>
      </div>
    </div>
    <div class="entry-body">
      ${(e.rounds || []).map(r => renderRound(r)).join('')}
      ${e.finalReply ? `<div class="reply-box">${escHtml(e.finalReply)}</div>` : ''}
    </div>
  `;
  return div;
}

function renderRound(r) {
  const tools = (r.toolCalls || []).map(tc => `
    <div class="tool-row">
      <div>
        <div><span class="tool-name">${escHtml(tc.tool)}</span> <span class="tool-arg">${escHtml(tc.args)}</span></div>
        ${tc.result ? `<div class="tool-result">${escHtml(tc.result)}</div>` : ''}
      </div>
    </div>`).join('');

  return `
    <div class="round-block">
      <div class="round-label">Round ${r.round}</div>
      ${r.thinking ? `<div class="thinking-box">💭 ${escHtml(r.thinking)}</div>` : ''}
      ${tools}
    </div>`;
}

function escHtml(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

async function poll() {
  const badge = document.getElementById('badge');
  try {
    const res = await fetch('/api/activity');
    const data = await res.json();
    const entries = data.entries || [];

    badge.textContent = '● live';
    badge.className = 'refresh-badge live';

    if (!entries.length) return;

    const feed = document.getElementById('feed');
    const newest = entries[0]?.timestamp;
    if (newest === lastTimestamp) return;
    lastTimestamp = newest;

    feed.innerHTML = '';
    for (const e of entries) feed.appendChild(renderEntry(e));

    // Auto-open the most recent entry
    const first = feed.querySelector('.entry');
    if (first) first.classList.add('open');

  } catch {
    badge.textContent = 'offline';
    badge.className = 'refresh-badge';
  }
}

poll();
setInterval(poll, 3000);
</script>
</body>
</html>
